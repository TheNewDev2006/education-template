<!DOCTYPE html>
<html lang="en" class="gate-html">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Access Your Website Preview</title>
  <link rel="icon" href="assets/images/logo/favicon.png" type="image/png">
  <!-- Bootstrap -->
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <!-- Main css -->
  <link rel="stylesheet" href="assets/css/main.css">
  <!-- Gate page styles -->
  <link rel="stylesheet" href="assets/css/gate.css">
</head>

<body class="gate-page">
  <div class="gate-container">
    <div class="gate-card">
      <!-- Logo Section -->
      <div class="gate-logo">
        <img src="assets/images/logo/logo.png" alt="Logo" class="gate-logo-img">
      </div>

      <!-- Header -->
      <div class="gate-header">
        <h1 class="gate-title">Welcome!</h1>
        <p class="gate-subtitle">Enter your details to access your website preview</p>
      </div>

      <!-- Form -->
      <form id="gateForm" class="gate-form" action="https://formspree.io/f/xjgpvaee" method="POST">
        <!-- Hidden field for timestamp -->
        <input type="hidden" name="_timestamp" id="formTimestamp">
        
        <div class="form-group">
          <label for="schoolName" class="form-label">Preschool / Kindergarten Name <span class="required">*</span></label>
          <input type="text" class="form-control gate-input" id="schoolName" name="schoolName" required placeholder="e.g., Sunshine Kids Academy">
        </div>

        <div class="form-group">
          <label for="contactPerson" class="form-label">Contact Person Name <span class="required">*</span></label>
          <input type="text" class="form-control gate-input" id="contactPerson" name="contactPerson" required placeholder="e.g., Mrs. Perera">
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label for="phone" class="form-label">Phone Number <span class="required">*</span></label>
            <input type="tel" class="form-control gate-input" id="phone" name="phone" required placeholder="e.g., +94 77 123 4567">
          </div>
          <div class="form-group half">
            <label for="email" class="form-label">Email Address <span class="required">*</span></label>
            <input type="email" class="form-control gate-input" id="email" name="email" required placeholder="e.g., info@school.lk">
          </div>
        </div>

        <div class="form-group">
          <label for="address" class="form-label">Address / Location <span class="required">*</span></label>
          <input type="text" class="form-control gate-input" id="address" name="address" required placeholder="e.g., 123 Galle Road, Colombo 03">
        </div>

        <div class="form-group">
          <label for="tagline" class="form-label">Tagline / Slogan <span class="optional">(Optional)</span></label>
          <input type="text" class="form-control gate-input" id="tagline" name="tagline" placeholder="e.g., Where Little Minds Grow Bright">
        </div>

        <button type="submit" class="gate-submit-btn">
          <span class="btn-text">View My Website</span>
          <span class="btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"></path>
              <path d="m12 5 7 7-7 7"></path>
            </svg>
          </span>
        </button>
      </form>

      <!-- Footer note -->
      <p class="gate-footer-note">Your information helps us personalize your experience</p>
    </div>

    <!-- Decorative elements -->
    <div class="gate-decoration gate-decoration-1"></div>
    <div class="gate-decoration gate-decoration-2"></div>
    <div class="gate-decoration gate-decoration-3"></div>
  </div>

  <!-- Scripts -->
  <script>
    // Check if already has data - redirect to main site
    (function() {
      const clientData = localStorage.getItem('cynix_client');
      if (clientData) {
        window.location.href = 'index.html';
        return;
      }
    })();

    // Handle form submission
    document.getElementById('gateForm').addEventListener('submit', function(e) {
      e.preventDefault();

      // Collect form data
      const formData = {
        schoolName: document.getElementById('schoolName').value.trim(),
        contactPerson: document.getElementById('contactPerson').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        address: document.getElementById('address').value.trim(),
        tagline: document.getElementById('tagline').value.trim() || 'Preschool & Kindergarten',
        timestamp: new Date().toISOString()
      };

      // Save to localStorage
      localStorage.setItem('cynix_client', JSON.stringify(formData));

      // Set timestamp for form
      document.getElementById('formTimestamp').value = formData.timestamp;

      // Submit to Formspree (in background)
      const form = this;
      fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: {
          'Accept': 'application/json'
        }
      }).catch(function(error) {
        console.log('Formspree submission error (non-critical):', error);
      });

      // Redirect to main site immediately
      window.location.href = 'index.html';
    });
  </script>
<script src="../kidschool-main/assets/js/personalization.js"></script>
</body>

</html>
